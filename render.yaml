services:
  - type: web
    name: email-writer-backend
    runtime: java
    plan: starter
    region: oregon
    branch: main
    rootDir: email-writer-sb
    buildCommand: ./mvnw -B -DskipTests package
    startCommand: java -Xms256m -Xmx512m -jar target/email-writer-sb-0.0.1-SNAPSHOT.jar
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: JAVA_VERSION
        value: 25
      - key: SERVER_PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: email-writer-db
          property: connectionString
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: DATABASE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: GEMINI_API_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_AUDIENCE
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,https://*.vercel.app
      - key: RATE_LIMIT_CAPACITY
        value: 60
      - key: RATE_LIMIT_REFILL_PER_MINUTE
        value: 60

  - type: pserv
    name: email-writer-db
    plan: starter
    region: oregon
    databaseName: email_writer
    databaseUser: email_writer
    ipAllowList: []
    # Allow only the backend service to connect by source: render keeps this
    # open by default; you can restrict to the web service's outbound IP later.
    version: "16"
