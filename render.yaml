services:
  - type: web
    name: email-writer-backend
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    rootDir: email-writer-sb
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: email-writer-db
          property: connectionString
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: DATABASE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: GEMINI_API_URL
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_AUDIENCE
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,https://*.vercel.app
      - key: RATE_LIMIT_CAPACITY
        value: 60
      - key: RATE_LIMIT_REFILL_PER_MINUTE
        value: 60

databases:
  - name: email-writer-db
    plan: free
    region: oregon
    databaseName: email_writer
    user: email_writer
    postgresMajorVersion: "16"
    ipAllowList: []
