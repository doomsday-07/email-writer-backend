spring.application.name=email-writer-sb
spring.jmx.enabled=true

# ---- Server ----
# Render sets PORT=10000 automatically on web services; Spring Boot reads it natively.
# In dev, Vite proxies /api -> http://localhost:9090.
server.port=${PORT:9090}

# ---- Gemini ----
# Required. No default. Application will fail to start if unset.
gemini.api.url=${GEMINI_API_URL}
gemini.api.key=${GEMINI_API_KEY}

# ---- Google OAuth (server-side, used to exchange auth codes for tokens) ----
# Create at https://console.cloud.google.com/apis/credentials (Web application client).
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET}
# The audience claim that the resource server will accept on ID tokens.
# Usually identical to google.oauth.client-id.
google.oauth.audience=${GOOGLE_OAUTH_AUDIENCE:${google.oauth.client-id}}

# ---- CORS ----
# Comma-separated list of allowed origins. Use the Vercel + local dev URLs.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

# ---- Rate limiting (per-user, per-minute) ----
app.rate-limit.capacity=${RATE_LIMIT_CAPACITY:60}
app.rate-limit.refill-per-minute=${RATE_LIMIT_REFILL_PER_MINUTE:60}

# ---- Database ----
# Defaults to H2 in-memory for local dev; set DATABASE_URL to a postgres:// URL in prod.
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:emailwriter;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${DATABASE_DIALECT:org.hibernate.dialect.H2Dialect}

# ---- Flyway ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---- Spring Security (OAuth2 Resource Server) ----
# Validates Google ID tokens against Google's JWKS endpoint.
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://accounts.google.com

# ---- Spring Mail (legacy, retained for potential future use) ----
# Wave 1 removes the auto-configured JavaMailSender dependency on the email
# flow. The /api/email/send endpoint now uses the Gmail API with the
# authenticated user's OAuth tokens. These properties are kept dormant in case
# you want to fall back to SMTP-based sending via a service account.
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=${GMAIL_USERNAME:}
# spring.mail.password=${GMAIL_PASSWORD:}
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
# spring.mail.properties.mail.smtp.starttls.required=true
# spring.mail.test-connection=false

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
